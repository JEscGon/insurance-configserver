spring:
  application:
    name: insurance_configserver
  cloud:
    compatibility-verifier:
      enabled: false
    config:
      server:
        git:
          uri: https://github.com/JEscGon/insurance-configserver
          default-label: main
          search-paths:
            - config
          clone-on-start: true
server:
  port: 8888

logging:
  level:
    org.springframework.cloud.config.server: DEBUG
    org.eclipse.jgit: INFO